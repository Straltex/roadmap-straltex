[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net assets.calendly.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com assets.calendly.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://calendly.com; frame-src https://calendly.com; object-src 'none'; base-uri 'self'"
